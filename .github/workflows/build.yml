name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build executable
      run: |
        pyinstaller --onefile --console --name TradingSystem main.py
    
    - name: Copy config files
      run: |
        copy config.json dist\config.json
        copy stock_prices.csv dist\stock_prices.csv

    - name: Package release
      run: |
        cd dist
        Compress-Archive -Path TradingSystem.exe, config.json, stock_prices.csv -DestinationPath TradingSystem-${{ github.ref_name }}-windows.zip
    
    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        files: dist/TradingSystem-${{ github.ref_name }}-windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
