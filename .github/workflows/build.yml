name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build executable
      run: |
        pyinstaller --onefile --console --name TradingSystem main.py
    
    - name: Create sample config
      run: |
        echo '{"anthropic_api_key": "", "default_excel_file": "investment_data.xlsx", "default_prices_file": "stock_prices.csv", "cash_equivalents": ["BIL", "USFR", "PJLXX"], "default_cash_floor_percent": 0.02, "default_target_allocation_percent": 0.025, "default_skip_if_above_percent": 0.02}' > dist/config.json.example
    
    - name: Create sample prices file
      run: |
        echo "TICKER,PRICE" > dist/stock_prices.csv.example
        echo "AAPL,175.00" >> dist/stock_prices.csv.example
        echo "GOOGL,140.00" >> dist/stock_prices.csv.example
    
    - name: Package release
      run: |
        cd dist
        Compress-Archive -Path TradingSystem.exe, config.json.example, stock_prices.csv.example -DestinationPath TradingSystem-${{ github.ref_name }}-windows.zip
    
    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        files: dist/TradingSystem-${{ github.ref_name }}-windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
